<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings ⚙️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: #ffffff;
  color:#111;
}

/* CARD */
.container{
  width:380px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border-radius:20px;
  padding:25px;
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
  animation:fade 0.6s ease;
}

h2{
  text-align:center;
  margin-bottom:20px;
}

/* ITEM */
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  background: rgba(255,255,255,0.06);
  cursor:pointer;
  transition:0.3s;
}

.item:hover{
  transform:scale(1.03);
  background: rgba(255,255,255,0.12);
}

.small{
  font-size:12px;
  opacity:0.7;
}

/* SELECT */
select{
  padding:6px;
  border:none;
  border-radius:8px;
  outline:none;
}

/* BUTTON */
.btn{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

.logout{
  background:#ff4d4d;
  color:white;
}

.info{
  background:#4da6ff;
  color:white;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modalContent{
  width:300px;
  background:white;
  color:black;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

.modalContent h3{
  margin-bottom:10px;
}

.modalContent button{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* ANIMATION */
@keyframes fade{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
.backBtn{
  width:80px;
  padding:10px;
  margin-bottom:15px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  background:#111;
  color:white;
  transition:0.3s;
}

.backBtn:hover{
  background:#444;
  transform:scale(1.03);
}
</style>

</head>
<body>

<div class="container">
<button class="backBtn" onclick="goHome()">⬅ Back</button>
  <h2>⚙️ Settings</h2>

  <!-- PROFILE -->
  <div class="item" onclick="goProfile()">
    <div>
      👤 Shaxsiy ma’lumotlar
      <div class="small">Profil sahifaga o‘tish</div>
    </div>
    ➜
  </div>

  <!-- LANGUAGE -->
  <div class="item">
    <div>
      🌐 Ilova tili
      <div class="small">UZ / RU / EN</div>
    </div>
    <select onchange="changeLang(this.value)">
      <option value="uz">O‘zbek</option>
      <option value="ru">Русский</option>
      <option value="en">English</option>
    </select>
  </div>

  <!-- ABOUT -->
  <div class="item" onclick="openAbout()">
    <div>
      ℹ️ Ilova haqida
      <div class="small">Muallif va versiya</div>
    </div>
    ➜
  </div>

  <!-- LOGOUT -->
  <button class="btn logout" onclick="logout()">🚪 Profildan chiqish</button>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modalContent">
    <h3>ℹ️ Ilova haqida</h3>
    <p>
      Muallif: <b>DJCHINGIZ</b><br><br>
      Versiya: <p>1.0.0 (Final Beta)</p>
    </p>
    <button onclick="closeModal()">Yopish</button>
  </div>
</div>

<script>

/* PROFILE PAGE */
function goProfile(){
  window.location.href = "./profile.html";
}

/* LANGUAGE */
function changeLang(lang){
  localStorage.setItem("lang", lang);

  if(lang === "uz"){
    alert("Til: O‘zbek 🇺🇿");
  }
  if(lang === "ru"){
    alert("Язык: Русский 🇷🇺");
  }
  if(lang === "en"){
    alert("Language: English 🇬🇧");
  }
}

/* ABOUT */
function openAbout(){
  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* LOGOUT */
function logout(){
  let ok = confirm("Profildan chiqasizmi?");
  if(ok){
    localStorage.clear();
    window.location.href = "./home.html";
  }
}
function goHome(){
  window.location.href = "./home.html";
}
</script>

</body>
</html>
