<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;

  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
}

.container {
  background: rgba(255,255,255,0.1);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);

  max-width: 90%;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 {
  font-size: 28px;
  margin-bottom: 15px;
}

p {
  font-size: 16px;
  opacity: 0.9;
  margin-bottom: 25px;
}

.loader {
  width: 50px;
  height: 50px;
  border: 5px solid rgba(255,255,255,0.3);
  border-top: 5px solid white;
  border-radius: 50%;
  margin: 0 auto 20px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% {
    transform: rotate(360deg);
  }
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #667eea;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

@media (max-width: 500px) {
  h1 {
    font-size: 22px;
  }

  p {
    font-size: 14px;
  }

  .container {
    padding: 25px;
  }
}
</style>

</head>
<body>

<div class="container">
  <div class="loader"></div>

  <h1>🚧 Texnik ishlar olib borilmoqda</h1>
  <p>
    Hozirda ro‘yxatdan o‘tish tizimi vaqtincha ishlamaydi.<br>
    Iltimos, keyinroq qayta urinib ko‘ring.
  </p>

  <button onclick="goBack()">⬅️ Orqaga qaytish</button>
</div>

<script>
function goBack() {
  if (document.referrer !== "") {
    window.history.back(); // oldingi sahifaga qaytadi
  } else {
    window.location.href = "./index.html"; // fallback (agar history bo‘lmasa)
  }
}
</script>

</body>
</html>
